name = "sevennova-orchestrator"
main = "src/index.ts"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "api.sevennova.ai", custom_domain = true }
]

[vars]
CORS_ORIGINS = "https://sevennova.ai,http://localhost:3000"
DEV_MODE = "false"
OLLAMA_URL = "http://localhost:11434"

# Secrets — set via: wrangler secret put <NAME>
# ANTHROPIC_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_PRICE_BASIC
# STRIPE_PRICE_FULL
# STRIPE_PRICE_INSTITUTIONAL
