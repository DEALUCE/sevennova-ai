name = "sevennova-orchestrator"
main = "src/index.ts"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "api.sevennova.ai", custom_domain = true }
]

[[kv_namespaces]]
binding = "SEVENNOVA_KEYS"
id = "7a4fa7318fea421baf31c803ac4ab30b"

[vars]
CORS_ORIGINS = "https://sevennova.ai,http://localhost:3000"
DEV_MODE = "false"
OLLAMA_URL = "http://localhost:11434"

# Secrets — set via: wrangler secret put <NAME>
# ANTHROPIC_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_PRICE_BASIC
# STRIPE_PRICE_FULL
# STRIPE_PRICE_INSTITUTIONAL
