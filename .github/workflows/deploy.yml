name: Build & Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy sevennova.ai (frontend)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.sevennova.ai

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-api:
    runs-on: ubuntu-latest
    name: Deploy api.sevennova.ai (orchestrator)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Deploy API worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          secrets: |
            ANTHROPIC_API_KEY
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            STRIPE_PRICE_BASIC
            STRIPE_PRICE_FULL
            STRIPE_PRICE_INSTITUTIONAL
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_BASIC: ${{ secrets.STRIPE_PRICE_BASIC }}
          STRIPE_PRICE_FULL: ${{ secrets.STRIPE_PRICE_FULL }}
          STRIPE_PRICE_INSTITUTIONAL: ${{ secrets.STRIPE_PRICE_INSTITUTIONAL }}
